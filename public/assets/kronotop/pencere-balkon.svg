<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#3498DB"/>
  <!-- Window frame -->
  <rect x="80" y="60" width="240" height="280" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <!-- Window dividers -->
  <line x1="200" y1="60" x2="200" y2="340" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="80" y1="200" x2="320" y2="200" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- City outside (small buildings through window) -->
  <g fill="rgba(255,255,255,0.25)">
    <rect x="100" y="130" width="15" height="70"/>
    <rect x="120" y="110" width="12" height="90"/>
    <rect x="140" y="140" width="10" height="60"/>
    <rect x="210" y="120" width="14" height="80"/>
    <rect x="230" y="135" width="12" height="65"/>
    <rect x="250" y="105" width="16" height="95"/>
    <rect x="275" y="125" width="12" height="75"/>
    <rect x="295" y="145" width="10" height="55"/>
  </g>
  <!-- Tiny windows on buildings -->
  <g fill="rgba(255,255,255,0.4)">
    <rect x="103" y="140" width="3" height="3"/><rect x="109" y="140" width="3" height="3"/>
    <rect x="253" y="115" width="3" height="3"/><rect x="260" y="115" width="3" height="3"/>
  </g>
  <!-- Single silhouette inside (looking out) -->
  <circle cx="180" cy="270" r="14" fill="rgba(255,255,255,0.4)"/>
  <rect x="170" y="284" width="20" height="40" rx="5" fill="rgba(255,255,255,0.3)"/>
  <!-- Window sill -->
  <rect x="75" y="335" width="250" height="8" rx="2" fill="rgba(255,255,255,0.3)"/>
</svg>
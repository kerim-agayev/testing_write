<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#C0392B"/>
  <!-- Gears -->
  <circle cx="150" cy="150" r="50" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <circle cx="150" cy="150" r="15" fill="rgba(255,255,255,0.2)"/>
  <g stroke="rgba(255,255,255,0.4)" stroke-width="6" stroke-linecap="round">
    <line x1="150" y1="95" x2="150" y2="105"/>
    <line x1="150" y1="195" x2="150" y2="205"/>
    <line x1="95" y1="150" x2="105" y2="150"/>
    <line x1="195" y1="150" x2="205" y2="150"/>
    <line x1="113" y1="113" x2="120" y2="120"/>
    <line x1="180" y1="180" x2="187" y2="187"/>
    <line x1="113" y1="187" x2="120" y2="180"/>
    <line x1="180" y1="120" x2="187" y2="113"/>
  </g>
  <!-- Second gear interlocking -->
  <circle cx="260" cy="200" r="35" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
  <circle cx="260" cy="200" r="10" fill="rgba(255,255,255,0.2)"/>
  <g stroke="rgba(255,255,255,0.35)" stroke-width="5" stroke-linecap="round">
    <line x1="260" y1="161" x2="260" y2="169"/>
    <line x1="260" y1="231" x2="260" y2="239"/>
    <line x1="221" y1="200" x2="229" y2="200"/>
    <line x1="291" y1="200" x2="299" y2="200"/>
  </g>
  <!-- Chimneys -->
  <rect x="60" y="270" width="30" height="90" fill="rgba(255,255,255,0.25)"/>
  <rect x="310" y="260" width="35" height="100" fill="rgba(255,255,255,0.25)"/>
  <!-- Smoke -->
  <circle cx="75" cy="255" r="10" fill="rgba(255,255,255,0.12)"/>
  <circle cx="80" cy="238" r="14" fill="rgba(255,255,255,0.08)"/>
  <circle cx="327" cy="245" r="12" fill="rgba(255,255,255,0.12)"/>
  <circle cx="335" cy="225" r="16" fill="rgba(255,255,255,0.08)"/>
  <!-- Production line -->
  <line x1="40" y1="360" x2="360" y2="360" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="120" cy="360" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="200" cy="360" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="280" cy="360" r="5" fill="rgba(255,255,255,0.3)"/>
</svg>
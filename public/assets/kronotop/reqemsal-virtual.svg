<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#1A5276"/>
  <!-- Grid perspective -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1">
    <!-- Horizontal grid lines -->
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="40" y1="240" x2="360" y2="240"/>
    <line x1="60" y1="280" x2="340" y2="280"/>
    <line x1="80" y1="320" x2="320" y2="320"/>
    <line x1="100" y1="360" x2="300" y2="360"/>
    <!-- Vertical grid lines converging -->
    <line x1="200" y1="100" x2="200" y2="400"/>
    <line x1="200" y1="100" x2="80" y2="400"/>
    <line x1="200" y1="100" x2="320" y2="400"/>
    <line x1="200" y1="100" x2="0" y2="340"/>
    <line x1="200" y1="100" x2="400" y2="340"/>
  </g>
  <!-- Connection nodes -->
  <g fill="rgba(255,255,255,0.6)">
    <circle cx="200" cy="120" r="5"/>
    <circle cx="140" cy="180" r="4"/>
    <circle cx="260" cy="170" r="4"/>
    <circle cx="100" cy="240" r="3.5"/>
    <circle cx="300" cy="230" r="3.5"/>
    <circle cx="200" cy="200" r="4"/>
    <circle cx="160" cy="260" r="3"/>
    <circle cx="240" cy="270" r="3"/>
  </g>
  <!-- Connection lines -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="1">
    <line x1="200" y1="120" x2="140" y2="180"/>
    <line x1="200" y1="120" x2="260" y2="170"/>
    <line x1="140" y1="180" x2="200" y2="200"/>
    <line x1="260" y1="170" x2="200" y2="200"/>
    <line x1="140" y1="180" x2="100" y2="240"/>
    <line x1="260" y1="170" x2="300" y2="230"/>
    <line x1="200" y1="200" x2="160" y2="260"/>
    <line x1="200" y1="200" x2="240" y2="270"/>
  </g>
  <!-- Pixel scatter -->
  <g fill="rgba(255,255,255,0.25)">
    <rect x="60" y="80" width="4" height="4"/>
    <rect x="80" y="60" width="4" height="4"/>
    <rect x="320" y="70" width="4" height="4"/>
    <rect x="340" y="90" width="4" height="4"/>
    <rect x="50" y="140" width="3" height="3"/>
    <rect x="350" y="150" width="3" height="3"/>
    <rect x="70" y="300" width="3" height="3"/>
    <rect x="330" y="310" width="3" height="3"/>
    <rect x="110" y="100" width="3" height="3"/>
    <rect x="290" y="110" width="3" height="3"/>
  </g>
</svg>
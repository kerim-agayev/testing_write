<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#E74C3C"/>
  <!-- Table -->
  <ellipse cx="200" cy="220" rx="140" ry="40" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <!-- Table legs -->
  <line x1="100" y1="255" x2="90" y2="350" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <line x1="300" y1="255" x2="310" y2="350" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <!-- Fork (left) -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none">
    <line x1="140" y1="120" x2="140" y2="200"/>
    <line x1="132" y1="120" x2="132" y2="155"/>
    <line x1="140" y1="120" x2="140" y2="155"/>
    <line x1="148" y1="120" x2="148" y2="155"/>
    <line x1="132" y1="155" x2="140" y2="165"/>
    <line x1="148" y1="155" x2="140" y2="165"/>
  </g>
  <!-- Knife (right) -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none">
    <line x1="260" y1="120" x2="260" y2="200"/>
    <path d="M260,120 Q270,140 260,160"/>
  </g>
  <!-- Two figures facing each other -->
  <circle cx="100" cy="150" r="12" fill="rgba(255,255,255,0.35)"/>
  <rect x="92" y="162" width="16" height="35" rx="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="300" cy="150" r="12" fill="rgba(255,255,255,0.35)"/>
  <rect x="292" y="162" width="16" height="35" rx="4" fill="rgba(255,255,255,0.25)"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#2E86C1"/>
  <!-- Blackboard frame -->
  <rect x="80" y="50" width="240" height="140" rx="3" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
  <!-- Blackboard shelf -->
  <rect x="75" y="188" width="250" height="6" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- Desks in perspective -->
  <g fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1">
    <rect x="80" y="250" width="70" height="8" rx="1"/>
    <rect x="165" y="250" width="70" height="8" rx="1"/>
    <rect x="250" y="250" width="70" height="8" rx="1"/>
    <rect x="100" y="290" width="80" height="8" rx="1"/>
    <rect x="200" y="290" width="80" height="8" rx="1"/>
    <rect x="120" y="330" width="90" height="8" rx="1"/>
    <rect x="230" y="330" width="90" height="8" rx="1"/>
  </g>
  <!-- Growing figure series (small to large) -->
  <g fill="rgba(255,255,255,0.45)">
    <!-- Smallest -->
    <circle cx="90" cy="96" r="5"/>
    <rect x="87" y="101" width="6" height="10" rx="1"/>
    <!-- Medium -->
    <circle cx="150" cy="92" r="7"/>
    <rect x="145" y="99" width="10" height="16" rx="2"/>
    <!-- Larger -->
    <circle cx="220" cy="88" r="9"/>
    <rect x="213" y="97" width="14" height="22" rx="2"/>
    <!-- Largest -->
    <circle cx="300" cy="82" r="11"/>
    <rect x="291" y="93" width="18" height="28" rx="3"/>
  </g>
</svg>
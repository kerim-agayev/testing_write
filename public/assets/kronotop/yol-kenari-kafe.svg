<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#D35400"/>
  <!-- Dark road perspective behind -->
  <polygon points="150,400 250,400 210,200 190,200" fill="rgba(0,0,0,0.15)"/>
  <line x1="200" y1="200" x2="200" y2="400" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="8,6"/>
  <!-- Neon sign frame -->
  <rect x="100" y="60" width="200" height="80" rx="6" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <rect x="108" y="68" width="184" height="64" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Neon glow -->
  <rect x="100" y="60" width="200" height="80" rx="6" fill="rgba(255,255,255,0.06)"/>
  <!-- Sign post -->
  <line x1="200" y1="140" x2="200" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Single table -->
  <ellipse cx="120" cy="260" rx="35" ry="12" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="120" y1="272" x2="120" y2="320" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Chair -->
  <path d="M90,280 Q90,310 100,310 L100,280" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Cup on table -->
  <rect x="115" y="250" width="10" height="8" rx="1" fill="rgba(255,255,255,0.35)"/>
  <!-- Ground line -->
  <line x1="40" y1="320" x2="170" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>
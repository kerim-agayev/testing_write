<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#4A235A"/>
  <!-- Darkness gradient overlay -->
  <defs>
    <linearGradient id="dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#dark)"/>
  <!-- Stairs going down -->
  <g fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5">
    <rect x="120" y="80" width="160" height="20"/>
    <rect x="130" y="110" width="150" height="20"/>
    <rect x="140" y="140" width="140" height="20"/>
    <rect x="150" y="170" width="130" height="20"/>
    <rect x="155" y="200" width="120" height="20"/>
    <rect x="160" y="230" width="110" height="20"/>
    <rect x="165" y="260" width="100" height="20"/>
    <rect x="170" y="290" width="90" height="20"/>
  </g>
  <!-- Side walls of stairway -->
  <line x1="120" y1="80" x2="170" y2="310" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="280" y1="80" x2="260" y2="310" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Single light point at bottom -->
  <circle cx="215" cy="340" r="6" fill="rgba(255,255,255,0.7)"/>
  <circle cx="215" cy="340" r="18" fill="rgba(255,255,255,0.1)"/>
  <circle cx="215" cy="340" r="35" fill="rgba(255,255,255,0.05)"/>
</svg>
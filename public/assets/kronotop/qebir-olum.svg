<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#6C3483"/>
  <!-- Gate/arch -->
  <path d="M120,350 L120,120 Q200,50 280,120 L280,350" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
  <!-- Arch inner -->
  <path d="M140,350 L140,140 Q200,80 260,140 L260,350" fill="rgba(255,255,255,0.06)"/>
  <!-- Dividing line (above/below realms) -->
  <line x1="60" y1="230" x2="340" y2="230" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Moon phases -->
  <circle cx="160" cy="140" r="12" fill="rgba(255,255,255,0.5)"/>
  <circle cx="200" cy="130" r="14" fill="rgba(255,255,255,0.4)"/>
  <circle cx="207" cy="125" r="11" fill="#6C3483"/>
  <circle cx="240" cy="140" r="12" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- Above realm - stars -->
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="100" cy="100" r="2"/>
    <circle cx="300" cy="90" r="2"/>
    <circle cx="330" cy="140" r="1.5"/>
    <circle cx="70" cy="160" r="1.5"/>
  </g>
  <!-- Below realm - roots/earth -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none">
    <path d="M160,250 Q170,280 160,310 Q155,330 165,350"/>
    <path d="M200,240 L200,290 Q210,320 200,350"/>
    <path d="M240,250 Q230,280 240,310 Q245,330 235,350"/>
  </g>
</svg>
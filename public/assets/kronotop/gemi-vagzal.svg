<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#1ABC9C"/>
  <!-- Ship bow -->
  <path d="M200,80 L280,240 L120,240 Z" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
  <line x1="200" y1="80" x2="200" y2="50" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Ship hull -->
  <path d="M100,240 Q200,280 300,240 L290,260 Q200,300 110,260 Z" fill="rgba(255,255,255,0.25)"/>
  <!-- Clock -->
  <circle cx="200" cy="170" r="25" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="200" y1="170" x2="200" y2="150" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="200" y1="170" x2="215" y2="175" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="200" cy="170" r="2" fill="rgba(255,255,255,0.7)"/>
  <!-- Crowd silhouettes -->
  <g fill="rgba(255,255,255,0.35)">
    <circle cx="80" cy="310" r="7"/><rect x="74" y="317" width="12" height="20" rx="3"/>
    <circle cx="110" cy="315" r="7"/><rect x="104" y="322" width="12" height="20" rx="3"/>
    <circle cx="140" cy="308" r="7"/><rect x="134" y="315" width="12" height="20" rx="3"/>
    <circle cx="260" cy="312" r="7"/><rect x="254" y="319" width="12" height="20" rx="3"/>
    <circle cx="290" cy="308" r="7"/><rect x="284" y="315" width="12" height="20" rx="3"/>
    <circle cx="320" cy="314" r="7"/><rect x="314" y="321" width="12" height="20" rx="3"/>
  </g>
  <!-- Enclosed space ceiling -->
  <path d="M30,290 Q200,270 370,290" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>